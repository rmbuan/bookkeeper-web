# PostgreSQL for Bookkeeper (run from web folder: docker-compose up -d)
services:
  postgres:
    image: postgres:16-alpine
    container_name: bookkeeper-db
    environment:
      POSTGRES_USER: bookkeeper
      POSTGRES_PASSWORD: bookkeeper
      POSTGRES_DB: bookkeeper
    ports:
      - "5433:5432"
    volumes:
      - bookkeeper_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookkeeper -d bookkeeper"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bookkeeper_pgdata:
